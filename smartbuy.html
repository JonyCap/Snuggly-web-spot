<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartBuy AI</title>

  <style>
    body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    color: #333;
  }

  header {
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.15);
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
  }

  header h1 {
    margin: 0;
    font-size: 24px;
  }

  header p {
    margin: 0;
    opacity: 0.8;
  }

  .container {
    text-align: center;
    margin-top: 100px;
  }

  h2 {
    color: white;
    font-size: 28px;
  }

  .search-box {
    position: relative;
    width: 420px;
    margin: 30px auto;
  }

  input {
    width: 100%;
    padding: 18px;
    border-radius: 15px;
    border: none;
    font-size: 16px;
    outline: none;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  }

  input:focus {
    transform: scale(1.02);
  }

  .suggestions {
    background: white;
    border-radius: 15px;
    margin-top: 8px;
    text-align: left;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    display: none;
    position: absolute;
    width: 100%;
    z-index: 10;
  }

  .suggestions div {
    padding: 12px;
    cursor: pointer;
  }

  .suggestions div:hover {
    background: #f0f2ff;
  }

  .results {
    margin-top: 50px;
    width: 70%;
    margin-left: auto;
    margin-right: auto;
  }

  .card {
    background: rgba(255, 255, 255, 0.9);
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-5px);
  }

  .best {
    border: 3px solid #00ffcc;
    box-shadow: 0 0 15px rgba(0,255,200,0.6);
  }

  .status-open {
    color: #00c853;
    font-weight: bold;
  }

  .status-closed {
    color: #ff5252;
    font-weight: bold;
  }

  </style>
</head>

<body>

<header>
  <h1>SmartBuy AI by Jonylina</h1>
  <p>Find the best place to shop smarter</p>
</header>

<div class="container">

  <h2>✨ What are you looking for today?</h2>

  <div class="search-box">
    <input type="text" id="search" placeholder="Type something like coffee, shampoo...">
    <div id="suggestions" class="suggestions"></div>
  </div>

  <div id="results" class="results"></div>

</div>

<script>

const products = [
  "coffee","shampoo","toothbrush","sim card","transportation card",
  "instant noodles","water","rice cooker","detergent","bedding",
  "power bank","notebook","umbrella","clothes","snacks"
];

const data = [
  {
    product: "coffee",
    stores: [
      { name: "Starbucks", price: 4500, distance: 300, rating: 4.7, open: true },
      { name: "Mega Coffee", price: 2000, distance: 500, rating: 4.4, open: true },
      { name: "Compose Coffee", price: 2500, distance: 400, rating: 4.3, open: false }
    ]
  },
  {
    product: "shampoo",
    stores: [
      { name: "Daiso", price: 8000, distance: 600, rating: 4.2, open: true },
      { name: "Olive Young", price: 12000, distance: 400, rating: 4.6, open: true },
      { name: "Local Supermarket", price: 9500, distance: 300, rating: 4.1, open: false }
    ]
  },
  {
    product: "toothbrush",
    stores: [
      { name: "Olive Young", price: 3000, distance: 400, rating: 4.5, open: true },
      { name: "Emart", price: 2500, distance: 1200, rating: 4.3, open: true },
      { name: "Homeplus", price: 2000, distance: 1500, rating: 4.2, open: false }
    ]
  },
  {
    product: "sim card",
    stores: [
      { name: "SK Telecom", price: 30000, distance: 700, rating: 4.6, open: true },
      { name: "KT", price: 28000, distance: 800, rating: 4.5, open: true },
      { name: "LG Uplus", price: 27000, distance: 900, rating: 4.4, open: false }
    ]
  },
  {
    product: "transportation card",
    stores: [
      { name: "CU", price: 4000, distance: 200, rating: 4.3, open: true },
      { name: "GS25", price: 4000, distance: 250, rating: 4.2, open: true },
      { name: "7-Eleven", price: 4000, distance: 300, rating: 4.1, open: true }
    ]
  },
  {
    product: "instant noodles",
    stores: [
      { name: "CU", price: 1500, distance: 200, rating: 4.4, open: true },
      { name: "GS25", price: 1400, distance: 250, rating: 4.3, open: true },
      { name: "Emart", price: 1200, distance: 1200, rating: 4.5, open: false }
    ]
  },
  {
    product: "water",
    stores: [
      { name: "CU", price: 1000, distance: 150, rating: 4.2, open: true },
      { name: "GS25", price: 1000, distance: 200, rating: 4.1, open: true },
      { name: "Homeplus", price: 800, distance: 1500, rating: 4.3, open: false }
    ]
  },
  {
    product: "rice cooker",
    stores: [
      { name: "Electro Mart", price: 120000, distance: 2000, rating: 4.6, open: true },
      { name: "Hi-Mart", price: 110000, distance: 1800, rating: 4.5, open: true }
    ]
  },
  {
    product: "detergent",
    stores: [
      { name: "Daiso", price: 5000, distance: 600, rating: 4.2, open: true },
      { name: "Homeplus", price: 7000, distance: 1400, rating: 4.4, open: false }
    ]
  },
  {
    product: "bedding",
    stores: [
      { name: "IKEA", price: 30000, distance: 5000, rating: 4.7, open: true },
      { name: "Daiso", price: 15000, distance: 700, rating: 4.3, open: true }
    ]
  },
  {
    product: "power bank",
    stores: [
      { name: "Artbox", price: 20000, distance: 600, rating: 4.5, open: true },
      { name: "Daiso", price: 10000, distance: 700, rating: 4.2, open: true }
    ]
  },
  {
    product: "notebook",
    stores: [
      { name: "Artbox", price: 3000, distance: 600, rating: 4.4, open: true },
      { name: "Daiso", price: 1500, distance: 700, rating: 4.3, open: true }
    ]
  },
  {
    product: "umbrella",
    stores: [
      { name: "Daiso", price: 7000, distance: 700, rating: 4.2, open: true },
      { name: "CU", price: 9000, distance: 200, rating: 4.1, open: true }
    ]
  },
  {
    product: "clothes",
    stores: [
      { name: "Uniqlo", price: 25000, distance: 1200, rating: 4.6, open: true },
      { name: "Topten", price: 20000, distance: 1000, rating: 4.4, open: true }
    ]
  },
  {
    product: "snacks",
    stores: [
      { name: "CU", price: 2000, distance: 200, rating: 4.3, open: true },
      { name: "GS25", price: 1800, distance: 250, rating: 4.2, open: true },
      { name: "7-Eleven", price: 1900, distance: 300, rating: 4.1, open: true }
    ]
  }
];

const searchInput = document.getElementById("search");
const suggestionsBox = document.getElementById("suggestions");

searchInput.addEventListener("input", function() {
  let value = this.value.toLowerCase();
  suggestionsBox.innerHTML = "";

  if (value === "") {
    suggestionsBox.style.display = "none";
    return;
  }

  let filtered = products.filter(p => p.includes(value));

  filtered.forEach(item => {
    let div = document.createElement("div");
    div.textContent = item;
    div.onclick = () => {
      searchInput.value = item;
      suggestionsBox.style.display = "none";
      showResults(item);
    };
    suggestionsBox.appendChild(div);
  });

  suggestionsBox.style.display = "block";
});

function showResults(product) {
  const resultsDiv = document.getElementById("results");

  const found = data.find(p => p.product === product);

  if (!found) {
    resultsDiv.innerHTML = "<p>No data found.</p>";
    return;
  }

  resultsDiv.innerHTML = `
    <h3>🔍 Results for "${product}"</h3>
    <p>Showing best options based on price, distance, and availability</p>
  `;

  let bestStore = null;
  let bestScore = Infinity;

  found.stores.forEach(store => {
    let score = store.price + store.distance;
    if (!store.open) score += 10000;

    if (score < bestScore) {
      bestScore = score;
      bestStore = store;
    }
  });

  found.stores.forEach(store => {
    const isBest = store === bestStore;

    resultsDiv.innerHTML += `
      <div class="card ${isBest ? "best" : ""}" 
           onclick="openMap('${store.name}')"
           style="cursor:pointer;">

        <div>
          <h3>${store.name}</h3>
          <p>💰 ${store.price}₩ | 📍 ${store.distance}m | ⭐ ${store.rating}</p>
          <p class="${store.open ? "status-open" : "status-closed"}">
            ${store.open ? "Open Now" : "Closed"}
          </p>
        </div>

        ${isBest ? "<h2>🏆 Best</h2>" : ""}

      </div>
    `;
  });
}

function openMap(storeName) {
  const query = encodeURIComponent(storeName + " Hadan-Dong ");
  const url = "https://map.kakao.com/?q=" + query;
  window.open(url, "_blank");
}
</script>

</body>
</html>
